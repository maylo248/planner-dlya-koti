<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Планер для коти 🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/cursor.css"/>
  <link rel="stylesheet" href="css/effects.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="js/firebase-init.js"></script>
</head>
<body>

  <!-- Background is now handled by CSS gradient -->

  <!-- App -->
  <div class="app" id="app">
    <header class="header" id="header">
      <div class="header-left">
        <div class="time-greeting" id="timeGreeting"></div>
        <h1 class="month-title" id="monthTitle"></h1>
      </div>
      <div class="header-center">
        <div class="segmented" id="modeToggle" role="tablist">
          <button class="seg-btn active" role="tab" data-mode="game" id="gameModeBtn"><span>👔</span><span>Таблица</span></button>
          <button class="seg-btn" role="tab" data-mode="pro"  id="proModeBtn"><span>📋</span><span>Список</span></button>
        </div>
      </div>
      <div class="header-right" style="display:flex; gap:12px; align-items:center;">
        <button class="action-btn" id="copyMonthBtn" data-tip="Скопировать график в следующий месяц">
          <span>⎘ Скопировать →</span>
        </button>
        <button class="nav-btn" id="prevMonth" aria-label="Предыдущий">‹</button>
        <button class="nav-btn" id="nextMonth" aria-label="Следующий">›</button>
      </div>
    </header>

    <main class="main" id="main">
      <div class="view-game active" id="viewGame">
        <div class="days-grid" id="daysGrid" role="list"></div>
      </div>
      <div class="view-pro" id="viewPro">
        <div class="pro-table-wrap">
          <table class="pro-table" id="proTable">
            <thead><tr>
              <th>День</th><th>Дата</th><th>Тип</th>
              <th>Смена</th><th>Час.</th><th>Грязными</th><th>НДС</th><th>НДФЛ</th><th>Чисто</th>
            </tr></thead>
            <tbody id="proTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="view-tasks" id="viewTasks">
        <div class="tasks-header">
          <h2 class="tasks-title" id="tasksTitle">📋 Мои задачи</h2>
        </div>
        <div class="tasks-list" id="tasksList"></div>
        <div class="tasks-add">
          <input type="text" class="tasks-input" id="tasksInput" placeholder="Добавить задачу..."/>
          <button class="tasks-add-btn" id="tasksAddBtn">+</button>
        </div>
      </div>
    </main>
  </div>

  <nav class="dock" id="dock">
    <button class="dock-btn" id="dockCharts"   data-tip="Графики 📊"><span class="dock-icon">📊</span></button>
    <button class="dock-btn" id="dockIncome"   data-tip="Доход 💰"><span class="dock-icon">💰</span></button>
    <button class="dock-btn" id="dockExpenses" data-tip="Расходы 🏠"><span class="dock-icon">🏠</span></button>
    <button class="dock-btn" id="dockTasks"    data-tip="Задачи 📅"><span class="dock-icon">✅</span></button>
    <button class="dock-btn" id="dockAuto"     data-tip="Автографик 🗓"><span class="dock-icon">🗓</span></button>
    <button class="dock-btn" id="dockCat"      data-tip="Вспомнить котика 🐱"><span class="dock-icon">🐱</span></button>
    <button class="dock-btn" id="dockExport"   data-tip="Экспорт 📤"><span class="dock-icon">📤</span></button>
    <button class="dock-btn" id="dockSettings" data-tip="Настройки ⚙️"><span class="dock-icon">⚙️</span></button>
  </nav>

  <!-- Popup -->
  <div class="popup-overlay" id="popupOverlay"></div>
  <div class="popup" id="dayPopup" role="dialog" aria-modal="true">
    <div class="popup-handle"></div>
    <div class="popup-header">
      <span class="popup-day-label" id="popupDayLabel"></span>
      <button class="popup-close" id="popupClose">✕</button>
    </div>
    <div class="popup-section">
      <div class="section-label">Тип дня</div>
      <div class="segmented type-seg" id="dayTypeSegment"></div>
    </div>
    <div class="popup-section shift-section" id="shiftSection">
      <div class="section-label">Смена</div>
      <div class="shift-presets" id="shiftPresets">
        <button class="shift-pill" data-shift="morning"><span class="shift-emoji">🌅</span><span class="shift-name">Утро</span><span class="shift-time">06–14</span></button>
        <button class="shift-pill" data-shift="day"><span class="shift-emoji">☀️</span><span class="shift-name">День</span><span class="shift-time">09–18</span></button>
        <button class="shift-pill" data-shift="evening"><span class="shift-emoji">🌆</span><span class="shift-name">Вечер</span><span class="shift-time">14–22</span></button>
        <button class="shift-pill" data-shift="night"><span class="shift-emoji">🌙</span><span class="shift-name">Ночь</span><span class="shift-time">22–06</span></button>
      </div>
      <div class="custom-time" id="customTime">
        <div class="time-row">
          <div class="time-field"><label class="time-label">Начало</label><input class="time-input" type="time" id="startTime"/></div>
          <div class="time-sep">→</div>
          <div class="time-field"><label class="time-label">Конец</label><input class="time-input" type="time" id="endTime"/></div>
          <div class="hours-badge" id="hoursBadge">0h</div>
        </div>
      </div>
    </div>
    <button class="popup-save" id="popupSave">Сохранить ✓</button>
  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer" role="dialog" aria-modal="true">
    <div class="drawer-header">
      <h2 class="drawer-title" id="drawerTitle"></h2>
      <button class="drawer-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-content" id="drawerContent"></div>
  </div>

  <!-- Export popup -->
  <div class="mini-popup" id="exportPopup">
    <button class="mini-item" id="exportPng">🖼 PNG</button>
    <button class="mini-item" id="exportTxt">📄 TXT</button>
    <button class="mini-item" id="exportJson">📦 JSON</button>
    <button class="mini-item" id="exportIcs">📅 Samsung / iCal</button>
    <button class="mini-item" id="exportTasks">✅ Задачи</button>
  </div>

  <!-- Cat Widget - Chibi Cat -->
  <div class="cat-widget" id="catWidget">
    <div class="cat-speech" id="catSpeech"></div>
    <div class="cat-wrapper">
      <svg viewBox="0 0 200 240" class="cat-svg">
        <defs>
          <radialGradient id="eyeGradient" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#7B68EE"/>
            <stop offset="100%" stop-color="#4A90D9"/>
          </radialGradient>
        </defs>
        
        <!-- Tail -->
        <g class="cat-tail">
          <path d="M150 200 Q190 180 185 140 Q180 110 175 120" fill="none" stroke="#F5F5F5" stroke-width="18" stroke-linecap="round"/>
          <path d="M150 200 Q190 180 185 140 Q180 110 175 120" fill="none" stroke="#E0E0E0" stroke-width="20" stroke-linecap="round" stroke-dasharray="5,15"/>
        </g>
        
        <!-- Body -->
        <ellipse cx="100" cy="200" rx="50" ry="35" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        
        <!-- Chest fluff -->
        <ellipse cx="100" cy="205" rx="30" ry="20" fill="#FAFAFA"/>
        
        <!-- Left Paw -->
        <ellipse cx="70" cy="225" rx="18" ry="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        <ellipse cx="62" cy="228" rx="6" ry="5" fill="#FFB6C1"/>
        <ellipse cx="70" cy="230" rx="6" ry="5" fill="#FFB6C1"/>
        <ellipse cx="78" cy="228" rx="6" ry="5" fill="#FFB6C1"/>
        
        <!-- Right Paw -->
        <ellipse cx="130" cy="225" rx="18" ry="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        <ellipse cx="122" cy="228" rx="6" ry="5" fill="#FFB6C1"/>
        <ellipse cx="130" cy="230" rx="6" ry="5" fill="#FFB6C1"/>
        <ellipse cx="138" cy="228" rx="6" ry="5" fill="#FFB6C1"/>
        
        <!-- Collar -->
        <ellipse cx="100" cy="165" rx="35" ry="8" fill="#4A90D9"/>
        <circle cx="100" cy="173" r="8" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
        <ellipse cx="100" cy="173" rx="3" ry="2" fill="#FFF8DC"/>
        
        <!-- Head -->
        <ellipse cx="100" cy="95" rx="75" ry="65" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        
        <!-- Left Ear -->
        <polygon points="30,55 55,5 75,55" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        <polygon points="38,50 55,18 68,50" fill="#FFB6C1"/>
        
        <!-- Right Ear -->
        <polygon points="125,55 145,5 170,55" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="3"/>
        <polygon points="132,50 145,18 162,50" fill="#FFB6C1"/>
        
        <!-- Left Eye -->
        <g class="cat-eye-left">
          <ellipse cx="65" cy="90" rx="22" ry="25" fill="white" stroke="#E0E0E0" stroke-width="2"/>
          <ellipse cx="65" cy="92" rx="16" ry="20" fill="url(#eyeGradient)"/>
          <ellipse class="cat-pupil" cx="65" cy="94" rx="10" ry="13" fill="#1a1a2e"/>
          <circle cx="58" cy="85" r="5" fill="white"/>
          <circle cx="70" cy="98" r="3" fill="white" opacity="0.6"/>
        </g>
        
        <!-- Right Eye -->
        <g class="cat-eye-right">
          <ellipse cx="135" cy="90" rx="22" ry="25" fill="white" stroke="#E0E0E0" stroke-width="2"/>
          <ellipse cx="135" cy="92" rx="16" ry="20" fill="url(#eyeGradient)"/>
          <ellipse class="cat-pupil" cx="135" cy="94" rx="10" ry="13" fill="#1a1a2e"/>
          <circle cx="128" cy="85" r="5" fill="white"/>
          <circle cx="140" cy="98" r="3" fill="white" opacity="0.6"/>
        </g>
        
        <!-- Blush -->
        <ellipse cx="45" cy="115" rx="12" ry="8" fill="#FFB6C1" opacity="0.5"/>
        <ellipse cx="155" cy="115" rx="12" ry="8" fill="#FFB6C1" opacity="0.5"/>
        
        <!-- Nose -->
        <ellipse cx="100" cy="115" rx="8" ry="6" fill="#FFB6C1"/>
        
        <!-- Mouth -->
        <path d="M100 120 Q92 130 85 125" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M100 120 Q108 130 115 125" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- Whiskers -->
        <line x1="35" y1="108" x2="5" y2="100" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
        <line x1="35" y1="118" x2="5" y2="118" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
        <line x1="35" y1="128" x2="5" y2="136" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
        <line x1="165" y1="108" x2="195" y2="100" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
        <line x1="165" y1="118" x2="195" y2="118" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
        <line x1="165" y1="128" x2="195" y2="136" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <button class="cat-close" id="catClose">✕</button>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-modal-overlay" id="authModal">
    <div class="auth-modal">
      <button class="auth-close-btn" id="authCloseBtn">✕</button>
      <div class="auth-modal-title" id="authModalTitle">🔐 Вход в профиль</div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Вход</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>
      <form id="authForm">
        <div class="auth-input-group">
          <label>Email</label>
          <input type="email" class="auth-input" id="authEmail" placeholder="your@email.com" required/>
        </div>
        <div class="auth-input-group">
          <label>Пароль</label>
          <input type="password" class="auth-input" id="authPassword" placeholder="Минимум 6 символов" required/>
        </div>
        <div class="auth-input-group" id="nameGroup" style="display:none;">
          <label>Имя (необязательно)</label>
          <input type="text" class="auth-input" id="authName" placeholder="Как вас называть?"/>
        </div>
        <button type="submit" class="auth-submit" id="authSubmit">Войти</button>
        <div class="auth-error" id="authError"></div>
      </form>
    </div>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
